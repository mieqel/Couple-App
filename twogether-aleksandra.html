<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TwoGether 💚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --forest:      #0d5c3a;
  --deep-forest: #054d30;
  --plum:        #3b1a4a;
  --violet:      #4e2070;
  --gold:        #c9a84c;
  --gold-soft:   rgba(201,168,76,.18);
  --ink:         #08100d;
  --surface:     #0f1a14;
  --card:        #111c17;
  --text:        #e8f0ea;
  --muted:       rgba(232,240,234,.4);
  --grad-cta:    linear-gradient(135deg, #0d5c3a 0%, #4e2070 100%);
  --grad-bg:     radial-gradient(ellipse 900px 600px at 10% 0%, #0a2e1c, transparent),
                 radial-gradient(ellipse 700px 500px at 100% 20%, #1e0a2e, transparent),
                 #08100d;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Inter', system-ui, sans-serif;
  background: var(--grad-bg);
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0;
  color: var(--text);
}



/* ══════════════════════════════════════
   PHONE SHELL
══════════════════════════════════════ */
.phone {
  width:390px; max-width:100vw;
  height:780px; max-height:100vh;
  background: var(--ink);
  border-radius:48px;
  border:1.5px solid rgba(255,255,255,.06);
  box-shadow:
    0 0 0 1px rgba(13,92,58,.3),
    0 40px 120px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;
  display:flex; flex-direction:column;
  position:relative;
}

/* ══════════════════════════════════════
   SCREENS
══════════════════════════════════════ */
.screens { flex:1; overflow:hidden; position:relative; min-height:0; }
.screen  { position:absolute; inset:0; display:none; overflow:hidden; }
.screen.active { display:flex; flex-direction:column; }

/* ══════════════════════════════════════
   FEED
══════════════════════════════════════ */
#feed-screen { background:#000; }

.feed-scroll {
  flex:1;
  overflow-y:scroll; overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -ms-overflow-style:none; scrollbar-width:none;
}
.feed-scroll::-webkit-scrollbar { display:none; }

.slide {
  width:100%; height:100%;
  scroll-snap-align:start; scroll-snap-stop:always;
  position:relative; overflow:hidden; flex-shrink:0;
}

/* image slide */
.slide-img { width:100%; height:100%; object-fit:cover; display:block; }

/* video placeholder */
.video-bg {
  width:100%; height:100%;
  background:linear-gradient(160deg, #071a10 0%, #1e0a2e 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.play-ring {
  width:72px; height:72px;
  border:2px solid rgba(201,168,76,.5);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; padding-left:5px;
  backdrop-filter:blur(8px);
  background:rgba(13,92,58,.2);
}
.video-bg p { color:var(--muted); font-size:.82rem; letter-spacing:.04em; }

/* text-only slide */
.text-bg {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center; padding:36px;
}
.text-content { text-align:center; }
.text-content .big-emoji { font-size:4.5rem; line-height:1; margin-bottom:20px; display:block; }
.text-content .slide-title { font-size:1.7rem; }
.text-content .slide-note  { margin-top:12px; color:rgba(232,240,234,.7); }

/* overlay */
.slide-overlay {
  position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(to top,
    rgba(5,12,8,.92) 0%,
    rgba(5,12,8,.2)  55%,
    rgba(5,12,8,.35) 100%);
}

/* bottom info */
.slide-info {
  position:absolute; bottom:0; left:0; right:64px;
  padding:22px 18px 20px; z-index:2;
}
.slide-cat {
  font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(201,168,76,.8); margin-bottom:7px;
}
.slide-title {
  font-family:'Cormorant Garant', serif;
  font-size:1.6rem; font-weight:700; line-height:1.18;
  margin-bottom:7px; color:#fff;
}
.slide-note { font-size:.82rem; color:rgba(255,255,255,.62); line-height:1.55; }

/* right action bar */
.slide-actions {
  position:absolute; right:12px; bottom:22px;
  display:flex; flex-direction:column; align-items:center; gap:20px; z-index:3;
}
.action-btn {
  background:rgba(255,255,255,.1); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:50%; width:50px; height:50px;
  font-size:1.35rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, background .2s;
}
.action-btn:active { transform:scale(.84); }
.action-btn.liked  {
  background:rgba(201,168,76,.25);
  border-color:rgba(201,168,76,.4);
}

/* feed top logo */
.feed-logo {
  position:absolute; top:0; left:0; right:0;
  padding:16px 20px 12px;
  display:flex; justify-content:center;
  z-index:10;
  background:linear-gradient(to bottom, rgba(0,0,0,.6) 0%, transparent 100%);
  pointer-events:none;
}
.feed-logo span {
  font-family:'Cormorant Garant', serif;
  font-size:1.3rem; font-weight:700; letter-spacing:.02em;
  background:linear-gradient(90deg, #4caf7d, #c9a84c);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

/* progress dots */
.dots {
  position:absolute; right:14px; top:50%;
  transform:translateY(-50%);
  display:flex; flex-direction:column; gap:5px; z-index:10; pointer-events:none;
}
.dot {
  width:3px; height:3px; border-radius:50%;
  background:rgba(255,255,255,.25); transition:background .2s, height .2s;
}
.dot.active { background:#c9a84c; height:14px; border-radius:2px; }

/* heart burst */
.burst { pointer-events:none; position:absolute; inset:0; z-index:30; }
.burst-heart {
  position:absolute; font-size:2rem;
  animation:fly .75s ease-out forwards; opacity:0;
}
@keyframes fly {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(.4); }
  55%  { opacity:1; transform:translate(var(--tx),var(--ty)) scale(1.4); }
  100% { opacity:0; transform:translate(calc(var(--tx)*1.7),calc(var(--ty)*1.7)) scale(.7); }
}

/* floating leaf particles */
.leaf { pointer-events:none; position:absolute; font-size:1rem; opacity:0; z-index:1; animation:leafFloat linear infinite; }
@keyframes leafFloat {
  0%   { opacity:0; transform:translateY(100%) rotate(0deg); }
  10%  { opacity:.18; }
  90%  { opacity:.12; }
  100% { opacity:0; transform:translateY(-120%) rotate(360deg); }
}

/* ══════════════════════════════════════
   POTENTIALS
══════════════════════════════════════ */
#pot-screen { background:var(--surface); overflow-y:auto; }
.pot-inner  { padding:20px 16px 100px; }

.screen-heading {
  font-family:'Cormorant Garant', serif;
  font-size:1.4rem; font-weight:700; margin-bottom:4px;
}
.screen-sub { font-size:.78rem; color:var(--muted); margin-bottom:20px; }

/* agenda planned */
.agenda-item { display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; }
.date-pill {
  flex-shrink:0; width:52px; text-align:center;
  background:rgba(13,92,58,.35);
  border:1px solid rgba(13,92,58,.6);
  border-radius:14px; padding:9px 4px;
}
.date-pill .day   { font-size:1.4rem; font-weight:700; line-height:1; color:#fff; }
.date-pill .mon   { font-size:.6rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:#4caf7d; margin-top:2px; }

.agenda-card {
  flex:1; background:var(--card);
  border-radius:18px; border:1px solid rgba(255,255,255,.06);
  padding:13px 14px 13px;
}
.agenda-card h3 { font-size:.95rem; font-weight:600; margin:5px 0 8px; line-height:1.3; }

.chip {
  font-size:.63rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
  border-radius:7px; padding:2px 8px; display:inline-block;
}
.chip--cat   { background:rgba(78,32,112,.4); color:#b07ee0; }
.chip--media { background:rgba(13,92,58,.3);  color:#4caf7d; margin-left:5px; }

.note2-line { font-size:.78rem; color:var(--muted); font-style:italic; margin:4px 0 9px; }
.btn-row { display:flex; gap:8px; }

.btn {
  border:none; border-radius:11px; padding:8px 15px;
  font-size:.8rem; font-weight:600; cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:opacity .12s, transform .1s;
}
.btn:active { opacity:.72; transform:scale(.96); }
.btn--primary { background:var(--grad-cta); color:#fff; }
.btn--done    { background:rgba(201,168,76,.18); color:var(--gold); border:1px solid rgba(201,168,76,.3); }
.btn--ghost   { background:rgba(255,255,255,.06); color:var(--muted); }

/* unplanned */
.section-label {
  font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(232,240,234,.25); margin:22px 0 12px 2px;
}
.pot-item {
  background:var(--card); border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  padding:13px 14px; margin-bottom:10px;
}
.pot-item h3 { font-size:.95rem; font-weight:600; margin:5px 0 9px; }

.empty {
  text-align:center; padding:50px 24px;
  color:rgba(232,240,234,.25); font-size:.88rem; line-height:1.8;
}

/* ══════════════════════════════════════
   MEMORIES
══════════════════════════════════════ */
#mem-screen { background:var(--surface); overflow-y:auto; }
.mem-inner  { padding:20px 16px 100px; }

.memory-card {
  background:var(--card);
  border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  border-left:3px solid rgba(13,92,58,.7);
  padding:14px 16px; margin-bottom:12px;
}
.memory-card h3 { font-size:.95rem; font-weight:600; margin:5px 0 5px; }
.stamp  { font-size:.75rem; color:var(--muted); margin:3px 0 10px; }
.heart-line { font-size:.8rem; color:var(--gold); font-style:italic; margin-bottom:10px; }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast {
  position:absolute; top:18px; left:50%; transform:translateX(-50%) translateY(-90px);
  background:rgba(8,16,13,.95); backdrop-filter:blur(14px);
  border:1px solid rgba(13,92,58,.5);
  border-radius:30px; padding:9px 22px;
  font-size:.83rem; font-weight:500; white-space:nowrap;
  transition:transform .3s cubic-bezier(.175,.885,.32,1.275);
  z-index:100; pointer-events:none; color:var(--text);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
.nav {
  display:flex; justify-content:space-around; align-items:center;
  padding:10px 0 22px;
  background:rgba(8,16,13,.97); backdrop-filter:blur(20px);
  border-top:1px solid rgba(13,92,58,.25);
  flex-shrink:0; position:relative; z-index:20;
}
.nav button {
  background:none; border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:4px 16px; font-size:.62rem; font-weight:600;
  color:rgba(232,240,234,.28); letter-spacing:.06em; text-transform:uppercase;
  transition:color .2s; position:relative;
  font-family:'Inter',sans-serif;
}
.nav button .icon { font-size:1.3rem; }
.nav button.active { color:#4caf7d; }
.nav button.active .icon { filter:drop-shadow(0 0 6px rgba(76,175,125,.6)); }

.badge {
  position:absolute; top:-2px; right:8px;
  background:var(--gold); color:#000;
  border-radius:10px; min-width:17px; height:17px;
  font-size:.6rem; font-weight:700;
  display:none; align-items:center; justify-content:center; padding:0 4px;
}
.badge.show { display:flex; }

/* ══════════════════════════════════════
   PLANNING SHEET
══════════════════════════════════════ */
.backdrop {
  position:absolute; inset:0; background:rgba(0,0,0,.6);
  z-index:40; display:none;
}
.backdrop.show { display:block; }

.sheet {
  position:absolute; bottom:-110%; left:0; right:0;
  background:#111c17;
  border-radius:28px 28px 0 0;
  border-top:1px solid rgba(13,92,58,.3);
  padding:20px 22px 40px; z-index:50;
  transition:bottom .32s cubic-bezier(.22,.85,.32,1);
}
.sheet.show { bottom:0; }
.sheet-handle {
  width:40px; height:4px;
  background:rgba(255,255,255,.12); border-radius:2px; margin:0 auto 18px;
}
.sheet h3 {
  font-family:'Cormorant Garant', serif;
  font-size:1.2rem; font-weight:700; margin-bottom:3px;
}
.sheet .sheet-sub { font-size:.82rem; color:var(--muted); margin-bottom:18px; }
.sheet label { font-size:.75rem; font-weight:600; color:var(--muted); display:block; margin-bottom:5px; }
.sheet input, .sheet textarea {
  width:100%; background:rgba(255,255,255,.05);
  border:1px solid rgba(13,92,58,.35);
  border-radius:12px; padding:11px 14px; color:var(--text);
  font-size:.88rem; outline:none; margin-bottom:14px;
  font-family:'Inter',sans-serif;
  transition:border-color .2s;
}
.sheet input:focus, .sheet textarea:focus { border-color:rgba(13,92,58,.8); }
.sheet textarea { resize:none; height:68px; }
.sheet-btns { display:flex; gap:10px; }
.sheet-btns .btn { flex:1; padding:14px; font-size:.88rem; }

/* photo dump */
.photo-dump-upload { margin-bottom:14px; }
.upload-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:rgba(13,92,58,.2); border:1.5px dashed rgba(13,92,58,.5);
  border-radius:12px; padding:11px 18px;
  font-size:.82rem; font-weight:600; color:#4caf7d;
  cursor:pointer; transition:background .15s; width:100%;
}
.upload-btn:hover { background:rgba(13,92,58,.35); }
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:24px; }
.photo-thumb { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; cursor:pointer; background:#0a1410; }
.thumb-media { width:100%; height:100%; object-fit:cover; display:block; }
.video-badge { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.6); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:.75rem; pointer-events:none; padding-left:2px; }
.thumb-delete { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.65); border:none; color:#fff; border-radius:50%; width:22px; height:22px; font-size:.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
.photo-thumb:active .thumb-delete { opacity:1; }
.photo-empty { color:rgba(232,240,234,.35); font-size:.82rem; text-align:center; padding:20px 0 10px; grid-column:1/-1; }
</style>
</head>
<body>

<div class="phone">
  <div class="screens">

    <!-- ══ FEED ══ -->
    <div class="screen active" id="feed-screen">
      <div class="feed-logo"><span>TwoGether</span></div>
      <div class="feed-scroll" id="feed"></div>
      <div class="dots" id="dots"></div>
    </div>

    <!-- ══ POTENTIALS ══ -->
    <div class="screen" id="pot-screen">
      <div class="pot-inner">
        <div class="screen-heading">Potentials 💌</div>
        <div class="screen-sub">Saved ideas — plan them into your agenda</div>
        <div id="pot-list"></div>
      </div>
    </div>

    <!-- ══ MEMORIES ══ -->
    <div class="screen" id="mem-screen">
      <div class="mem-inner">
        <div class="screen-heading">Memories 📸</div>
        <div id="mem-list"></div>
      </div>
    </div>

  </div>

  <!-- nav -->
  <nav class="nav">
    <button class="active" data-screen="feed">
      <span class="icon">🏠</span>Feed
    </button>
    <button data-screen="pot">
      <span class="icon">💌</span>Potentials
      <span class="badge" id="pot-badge"></span>
    </button>
    <button data-screen="mem">
      <span class="icon">📸</span>Memories
    </button>
  </nav>

  <div class="toast" id="toast"></div>
  <div class="backdrop" id="backdrop"></div>

  <!-- planning sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <h3>Plan a date</h3>
    <p class="sheet-sub" id="sheet-sub"></p>
    <label>Pick a date</label>
    <input type="date" id="plan-date">
    <label>Add a note (optional)</label>
    <textarea id="plan-note" placeholder="e.g. book the restaurant first 🍷"></textarea>
    <div class="sheet-btns">
      <button class="btn btn--ghost" id="cancel-plan">Cancel</button>
      <button class="btn btn--primary" id="confirm-plan">It's a date 💕</button>
    </div>
  </div>

  <div class="burst" id="burst"></div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const ideas = [
  {
    id:1, type:'video',
    src:'videos/canal.mp4',
    poster:'https://images.unsplash.com/photo-1558618047-3c8c76ca7d13?w=600&q=80',
    title:'Canal boat tour in Amsterdam', category:'🚢 Amsterdam',
    note:'Drift past golden canal houses, spot houseboats, and watch the city slow down. Pure magic at dusk.',
    status:'new'
  },
  {
    id:2, type:'image',
    src:'https://images.unsplash.com/HNI-bDO-V3E?w=600&q=80',
    title:'Keukenhof tulip fields', category:'🌷 Holland',
    note:'7 million flowers. The Netherlands showing off. Go early, bring a camera, get lost in colour.',
    status:'saved'
  },
  {
    id:3, type:'video',
    src:'videos/cycling.mp4',
    poster:'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=600&q=80',
    title:'Bike ride through the countryside', category:'🚲 Outdoors',
    note:'Rent bikes, pick a windmill route, stop at a kaasboerderij for cheese. Quintessentially Dutch.',
    status:'new'
  },
  {
    id:4, type:'image',
    src:'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&q=80',
    title:'Late-night Rotterdam food crawl', category:'🍴 Food',
    note:'Markthal first, then follow your nose. Three spots, no plan, eat until you physically cannot.',
    status:'planned',
    plannedDate: (() => { const d=new Date(); d.setDate(d.getDate()+18); return d.toISOString().slice(0,10); })()
  },
  {
    id:5, type:'image',
    src:'https://images.unsplash.com/uUEnBWU6TL8?w=600&q=80',
    title:'Muiderslot Castle day trip', category:'🏰 History',
    note:'A real fairytale castle, 20 min from Amsterdam. Guided tour, moat, the works. Straight out of a movie.',
    status:'new'
  },
  {
    id:6, type:'video',
    src:'videos/windmill.mp4',
    poster:'https://images.unsplash.com/kNmlCjM3apA?w=600&q=80',
    title:'Kinderdijk windmills at sunset', category:'🌅 Holland',
    note:'19 windmills, UNESCO-listed, glowing orange at golden hour. Bring a bottle of wine and a blanket.',
    status:'new'
  },
  {
    id:7, type:'text', emoji:'🧩',
    gradFrom:'#0a1a0a', gradTo:'#1e0a2e',
    title:'Board game café', category:'🎮 Games',
    note:'Loser buys stroopwafels for a week. No exceptions. No negotiations.',
    status:'done',
    plannedDate:'2026-05-18',
    note2:'She destroyed me at Ticket to Ride 😭'
  },
  {
    id:8, type:'image',
    src:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80',
    title:'Scheveningen beach day', category:'🏖️ Beach',
    note:"Den Haag's beach strip. Seafood, pier, cold North Sea water. Stay until the sun drops.",
    status:'new'
  },
  {
    id:9, type:'text', emoji:'🎨',
    gradFrom:'#071a10', gradTo:'#2a0e3a',
    title:'Van Gogh Museum + wine bar', category:'🖼️ Culture',
    note:'Rijksmuseum or Van Gogh — pick one and take it slow. Then GlouGlou wine bar on Utrechtsestraat.',
    status:'new'
  },
  {
    id:10, type:'image',
    src:'https://images.unsplash.com/OqNbbmZ8RH8?w=600&q=80',
    title:'Hortus Botanicus picnic', category:'🌿 Amsterdam',
    note:'6,000 exotic plants, a butterfly greenhouse, and quiet benches. Pack a picnic, stay all afternoon.',
    status:'new'
  },
];

// ── HELPERS ──────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const feedEl   = $('feed');
const potEl    = $('pot-list');
const memEl    = $('mem-list');
const toastEl  = $('toast');
const badge    = $('pot-badge');
const dotsEl   = $('dots');
const sheet    = $('sheet');
const backdrop = $('backdrop');
const burstEl  = $('burst');

// ── BUILD SLIDES ─────────────────────────────────────────────────────
function buildSlide(idea) {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.id = idea.id;

  let inner = '';

  if (idea.type === 'image') {
    inner = `
      <img class="slide-img" src="${idea.src}" alt="${idea.title}" loading="lazy">
      <div class="slide-overlay"></div>`;
  } else if (idea.type === 'video') {
    inner = `
      <video class="slide-img slide-video" src="${idea.src}" poster="${idea.poster||''}" muted playsinline loop preload="metadata"></video>
      <div class="slide-overlay"></div>`;
  } else {
    inner = `
      <div class="text-bg" style="background:linear-gradient(145deg,${idea.gradFrom},${idea.gradTo})">
        <div class="text-content">
          <span class="big-emoji">${idea.emoji}</span>
          <div class="slide-title">${idea.title}</div>
          <div class="slide-note">${idea.note}</div>
        </div>
      </div>`;
  }

  const showInfo = idea.type !== 'text';
  div.innerHTML = `
    ${inner}
    ${showInfo ? `
    <div class="slide-info">
      <div class="slide-cat">${idea.category}${idea.type==='video' ? ' · 🎬 Video' : ''}</div>
      <div class="slide-title">${idea.title}</div>
      <div class="slide-note">${idea.note}</div>
    </div>` : ''}
    <div class="slide-actions">
      <button class="action-btn like-btn ${idea.status!=='new'?'liked':''}" data-id="${idea.id}">
        ${idea.status!=='new' ? '💚' : '🤍'}
      </button>
    </div>`;
  return div;
}

function buildFeed() {
  feedEl.innerHTML = '';
  dotsEl.innerHTML = '';
  ideas.forEach((idea, i) => {
    feedEl.appendChild(buildSlide(idea));
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });
  // scroll spy for dots + video autoplay
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('.slide-video');
      if (!video) return;
      if (entry.isIntersecting) { video.play().catch(()=>{}); }
      else { video.pause(); video.currentTime = 0; }
    });
  }, { root: feedEl, threshold: 0.7 });

  feedEl.querySelectorAll('.slide').forEach(slide => observer.observe(slide));

  feedEl.addEventListener('scroll', () => {
    const h = feedEl.clientHeight;
    const idx = Math.round(feedEl.scrollTop / h);
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  });
}

// ── RENDER FEED (update buttons only, no scroll reset) ────────────────
function renderFeed() {
  feedEl.querySelectorAll('.like-btn').forEach(btn => {
    const idea = ideas.find(i => i.id === Number(btn.dataset.id));
    btn.textContent = idea.status !== 'new' ? '💚' : '🤍';
    btn.classList.toggle('liked', idea.status !== 'new');
  });
}

// ── RENDER POTENTIALS ─────────────────────────────────────────────────
function renderPotentials() {
  const saved = ideas.filter(i => i.status === 'saved' || i.status === 'planned');
  if (!saved.length) {
    potEl.innerHTML = '<div class="empty">Nothing saved yet 🤍<br>Heart an idea in the feed to add it here.</div>';
    return;
  }

  const planned   = saved.filter(i => i.status === 'planned').sort((a,b) => new Date(a.plannedDate)-new Date(b.plannedDate));
  const unplanned = saved.filter(i => i.status === 'saved');
  let html = '';

  planned.forEach(idea => {
    const d   = new Date(idea.plannedDate);
    const day = d.getDate();
    const mon = d.toLocaleDateString('en-GB', { month:'short' });
    const mLabel = idea.type==='video' ? '🎬 Video' : idea.type==='image' ? '🖼 Photo' : '✏️ Text';
    html += `
      <div class="agenda-item">
        <div class="date-pill"><div class="day">${day}</div><div class="mon">${mon}</div></div>
        <div class="agenda-card">
          <span class="chip chip--cat">${idea.category}</span>
          <span class="chip chip--media">${mLabel}</span>
          <h3>${idea.title}</h3>
          ${idea.note2 ? `<div class="note2-line">"${idea.note2}"</div>` : ''}
          <div class="btn-row">
            <button class="btn btn--done"  data-act="complete" data-id="${idea.id}">We did it! 🥹</button>
            <button class="btn btn--ghost" data-act="remove"   data-id="${idea.id}">Remove</button>
          </div>
        </div>
      </div>`;
  });

  if (unplanned.length) {
    html += `<div class="section-label">Not yet planned</div>`;
    unplanned.forEach(idea => {
      const mLabel = idea.type==='video' ? '🎬 Video' : idea.type==='image' ? '🖼 Photo' : '✏️ Text';
      html += `
        <div class="pot-item">
          <span class="chip chip--cat">${idea.category}</span>
          <span class="chip chip--media">${mLabel}</span>
          <h3>${idea.title}</h3>
          <div class="btn-row">
            <button class="btn btn--primary" data-act="plan"   data-id="${idea.id}">Plan it 📅</button>
            <button class="btn btn--ghost"   data-act="remove" data-id="${idea.id}">Remove</button>
          </div>
        </div>`;
    });
  }

  potEl.innerHTML = html;
}

// ── PHOTO DUMP (in-memory, session only) ──────────────────────────────
const photoDump = [
  { id:1, dataUrl:'https://www.w3schools.com/html/mov_bbb.mp4',       isVideo:true  },
  { id:2, dataUrl:'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=600&q=80', isVideo:false },
  { id:3, dataUrl:'https://www.w3schools.com/html/movie.mp4',         isVideo:true  },
  { id:4, dataUrl:'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=600&q=80', isVideo:false },
  { id:5, dataUrl:'https://images.unsplash.com/photo-1464207687429-7505649dae38?w=600&q=80', isVideo:false },
];

function renderMemories() {
  const done = ideas.filter(i => i.status==='done').sort((a,b)=>new Date(b.plannedDate)-new Date(a.plannedDate));

  let html = '';
  if (done.length) {
    html += done.map(idea => {
      const d = new Date(idea.plannedDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
      return `
        <div class="memory-card">
          <span class="chip chip--cat">${idea.category}</span>
          <h3>${idea.title}</h3>
          <div class="stamp">📅 ${d}</div>
          ${idea.note2 ? `<div class="heart-line">"${idea.note2}"</div>` : ''}
        </div>`;
    }).join('');
  } else {
    html += `<div class="empty" style="padding:30px 0 10px">No date memories yet 💚<br><small>Mark a planned date as done and it'll appear here.</small></div>`;
  }

  html += `
    <div class="section-label" style="margin-top:26px">Our photos 📷</div>
    <div class="photo-dump-upload">
      <label class="upload-btn" for="photo-input">＋ Add photos or videos</label>
      <input type="file" id="photo-input" accept="image/*,video/*" multiple style="display:none">
    </div>
    <div class="photo-grid" id="photo-grid"></div>`;

  memEl.innerHTML = html;
  renderPhotoGrid();

  document.getElementById('photo-input').addEventListener('change', function() {
    Array.from(this.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        photoDump.unshift({ id: Date.now() + Math.random(), dataUrl: e.target.result, isVideo: file.type.startsWith('video') });
        renderPhotoGrid();
      };
      reader.readAsDataURL(file);
    });
    this.value = '';
  });
}

function renderPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  if (!grid) return;
  if (!photoDump.length) {
    grid.innerHTML = `<p class="photo-empty">Dump your photos here — no organising needed 🌿</p>`;
    return;
  }
  grid.innerHTML = photoDump.map(p => `
    <div class="photo-thumb" data-pid="${p.id}">
      ${p.isVideo
        ? `<video src="${p.dataUrl}" class="thumb-media" preload="metadata" muted playsinline></video><div class="video-badge">▶</div>`
        : `<img src="${p.dataUrl}" class="thumb-media" alt="">`}
      <button class="thumb-delete" data-pid="${p.id}">✕</button>
    </div>`).join('');

  grid.querySelectorAll('.thumb-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = photoDump.findIndex(p => String(p.id) === btn.dataset.pid);
      if (idx !== -1) { photoDump.splice(idx,1); renderPhotoGrid(); }
    });
  });

  grid.querySelectorAll('.photo-thumb').forEach(thumb => {
    thumb.addEventListener('click', e => {
      if (e.target.classList.contains('thumb-delete')) return;
      const item = photoDump.find(p => String(p.id) === thumb.dataset.pid);
      if (item) openPreview(item);
    });
  });
}

function openPreview(item) {
  const existing = document.getElementById('preview-overlay');
  if (existing) existing.remove();
  const ov = document.createElement('div');
  ov.id = 'preview-overlay';
  ov.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.93);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;';
  ov.innerHTML = (item.isVideo
    ? `<video src="${item.dataUrl}" controls autoplay style="max-width:90%;max-height:72%;border-radius:14px;"></video>`
    : `<img src="${item.dataUrl}" style="max-width:90%;max-height:76%;border-radius:14px;object-fit:contain;">`)
    + `<button style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:9px 26px;border-radius:22px;font-size:.85rem;cursor:pointer;font-family:Inter,sans-serif;">Close</button>`;
  ov.querySelector('button').addEventListener('click', () => ov.remove());
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.querySelector('.phone').appendChild(ov);
}

function updateBadge() {
  const n = ideas.filter(i => i.status==='saved'||i.status==='planned').length;
  badge.textContent = n;
  badge.classList.toggle('show', n>0);
}

function renderAll() { renderFeed(); renderPotentials(); renderMemories(); updateBadge(); }

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2100);
}

// ── HEART BURST ───────────────────────────────────────────────────────
function doBurst(x, y) {
  burstEl.innerHTML = '';
  for (let k=0; k<12; k++) {
    const h = document.createElement('div');
    h.className = 'burst-heart';
    const angle = (k/12)*Math.PI*2;
    const dist  = 50 + Math.random()*65;
    h.style.cssText = `left:${x}px;top:${y}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${k*25}ms;`;
    h.textContent = '💚';
    burstEl.appendChild(h);
  }
  setTimeout(() => burstEl.innerHTML='', 1000);
}

// ── FLOATING LEAVES ───────────────────────────────────────────────────
function spawnLeaves() {
  const phone = document.querySelector('.phone');
  const leaves = ['🍃','🌿','🍀'];
  setInterval(() => {
    if (document.querySelector('#feed-screen.active') === null) return;
    const l = document.createElement('div');
    l.className = 'leaf';
    l.textContent = leaves[Math.floor(Math.random()*leaves.length)];
    l.style.cssText = `left:${5+Math.random()*90}%;animation-duration:${8+Math.random()*6}s;animation-delay:${Math.random()*2}s;font-size:${.7+Math.random()*.5}rem;`;
    phone.appendChild(l);
    setTimeout(() => l.remove(), 16000);
  }, 3000);
}

// ── FEED EVENTS ───────────────────────────────────────────────────────
let lastTap=0, lastId=null;

feedEl.addEventListener('click', e => {
  const btn = e.target.closest('.like-btn');
  if (btn) {
    e.stopPropagation();
    const id   = Number(btn.dataset.id);
    const idea = ideas.find(i=>i.id===id);
    idea.status = idea.status==='new' ? 'saved' : 'new';
    renderAll();
    showToast(idea.status==='saved' ? 'Saved to Potentials 💌' : 'Removed 🤍');
    return;
  }
  const slide = e.target.closest('.slide');
  if (!slide) return;
  const id  = Number(slide.dataset.id);
  const now = Date.now();
  if (now - lastTap < 300 && lastId === id) {
    const idea = ideas.find(i=>i.id===id);
    if (idea.status==='new') { idea.status='saved'; renderAll(); showToast('Saved to Potentials 💌'); }
    const r = slide.closest('.phone').getBoundingClientRect();
    doBurst(e.clientX-r.left, e.clientY-r.top);
    lastTap=0;
  } else { lastTap=now; lastId=id; }
});

// ── POTENTIALS EVENTS ─────────────────────────────────────────────────
let planningId=null;
potEl.addEventListener('click', e => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const id   = Number(btn.dataset.id);
  const idea = ideas.find(i=>i.id===id);
  if (btn.dataset.act==='remove')   { idea.status='new'; renderAll(); showToast('Removed 🤍'); }
  if (btn.dataset.act==='plan')     { openSheet(idea); }
  if (btn.dataset.act==='complete') {
    idea.status='done';
    if (!idea.plannedDate) idea.plannedDate=new Date().toISOString().slice(0,10);
    renderAll(); showToast('Another memory made 🥹💚'); switchTo('mem');
  }
});

// ── SHEET ──────────────────────────────────────────────────────────────
function openSheet(idea) {
  planningId=idea.id;
  $('sheet-sub').textContent=idea.title;
  $('plan-date').value='';
  $('plan-note').value='';
  sheet.classList.add('show'); backdrop.classList.add('show');
}
function closeSheet() { sheet.classList.remove('show'); backdrop.classList.remove('show'); }
backdrop.addEventListener('click', closeSheet);
$('cancel-plan').addEventListener('click', closeSheet);
$('confirm-plan').addEventListener('click', () => {
  const idea = ideas.find(i=>i.id===planningId);
  const date = $('plan-date').value;
  if (!date) { showToast('Pick a date first 📅'); return; }
  idea.status='planned'; idea.plannedDate=date;
  const note=$('plan-note').value.trim();
  if (note) idea.note2=note;
  closeSheet(); renderAll(); showToast("It's a date 💕");
});

// ── NAV ────────────────────────────────────────────────────────────────
function switchTo(target) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id===`${target}-screen`));
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.screen===target));
  if (target==='pot') renderPotentials();
  if (target==='mem') renderMemories();
}
document.querySelector('.nav').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn && btn.dataset.screen) switchTo(btn.dataset.screen);
});

// ── INIT ───────────────────────────────────────────────────────────────
buildFeed();
renderAll();
spawnLeaves();
</script>
</body>
</html>
